name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  # Permite rodar a automação manualmente pelo painel do GitHub
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout do código
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalar dependências
      run: npm install

    - name: 🏗️ Fazer o Build (Gerar arquivos de produção)
      run: npm run build

    - name: 🚀 Deploy via FTP na Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # Coloque o caminho de onde os arquivos devem ficar na Hostinger:
        server-dir: ./public_html/crm/
